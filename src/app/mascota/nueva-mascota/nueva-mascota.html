<header class="header">
  <div class="header-container">
    <a routerLink="/inicio" class="logo">
      <img src="/img/Medicat.png" alt="Medicat logo" />
    </a>
    <nav class="nav">
      <a routerLink="/inicio" class="nav-link">Inicio</a>
      <a routerLink="/mascotas" class="nav-link">Listado de Mascotas</a>
      <a routerLink="/clientes" class="nav-link">Clientes</a>
    </nav>
  </div>
</header>

<main class="dashboard">
  <section class="dashboard-header dashboard-header--centered">
    <h1 class="dashboard-title">Nueva Mascota</h1>
    <p class="dashboard-subtitle">Completa el formulario para registrar una nueva mascota</p>
  </section>

  <div class="form-card">
    <form (ngSubmit)="registrarMascota()" #formMascota="ngForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            [(ngModel)]="mascotaForm.nombre"
            placeholder="Ej. Firulais"
            required
          />
        </div>

        <div class="form-group">
          <label for="especie">Especie</label>
          <input
            type="text"
            id="especie"
            name="especie"
            [(ngModel)]="mascotaForm.especie"
            placeholder="Ej. Perro"
            required
          />
        </div>

        <div class="form-group">
          <label for="raza">Raza</label>
          <input
            type="text"
            id="raza"
            name="raza"
            [(ngModel)]="mascotaForm.raza"
            placeholder="Ej. Labrador"
            required
          />
        </div>

        <div class="form-group">
          <label for="edad">Edad (años)</label>
          <input
            type="number"
            id="edad"
            name="edad"
            [(ngModel)]="mascotaForm.edad"
            min="0"
            placeholder="Ej. 3"
            required
          />
        </div>

        <div class="form-group">
          <label for="peso">Peso (kg)</label>
          <input
            type="number"
            id="peso"
            name="peso"
            [(ngModel)]="mascotaForm.peso"
            step="0.1"
            min="0"
            placeholder="Ej. 10.5"
            required
          />
        </div>

        <div class="form-group">
          <label for="estado">Estado</label>
          <select id="estado" name="estado" [(ngModel)]="mascotaForm.estado" required>
            <option value="" disabled>Selecciona un estado</option>
            <option value="Sano">Sano</option>
            <option value="En Tratamiento">En Tratamiento</option>
            <option value="Requiere Atención">Requiere Atención</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="clienteId">Dueño</label>
          <select id="clienteId" name="clienteId" [(ngModel)]="mascotaForm.clienteId" required>
            <option [ngValue]="null" disabled>Selecciona el dueño</option>
            <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
              {{ cliente.nombre }} {{ cliente.apellido }}
            </option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="enfermedad">Enfermedad</label>
          <input
            type="text"
            id="enfermedad"
            name="enfermedad"
            [(ngModel)]="mascotaForm.enfermedad"
            placeholder="Ej. Sin enfermedad"
          />
        </div>

        <div class="form-group">
          <label for="tratamiento">Tratamiento asignado</label>
          <select id="tratamiento" name="tratamiento" [(ngModel)]="mascotaForm.tratamiento">
            <option value="">Sin tratamiento asignado</option>
            <option *ngFor="let tratamiento of tratamientosDisponibles" [value]="tratamiento">
              {{ tratamiento }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="veterinarioAsignado">Veterinario asignado</label>
          <select
            id="veterinarioAsignado"
            name="veterinarioAsignado"
            [(ngModel)]="mascotaForm.veterinarioAsignado"
          >
            <option value="">Sin veterinario asignado</option>
            <option
              *ngFor="let veterinario of veterinariosDisponibles"
              [value]="veterinario.nombre"
            >
              {{ veterinario.nombre }} - {{ veterinario.especialidad }}
            </option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea
            id="observaciones"
            name="observaciones"
            [(ngModel)]="mascotaForm.observaciones"
            placeholder="Escribe observaciones relevantes..."
          ></textarea>
        </div>
      </div>

      <p *ngIf="mascotaRegistrada" class="flash-message flash-message-success">
        {{ mascotaRegistrada }}
      </p>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar" [disabled]="formMascota.invalid">
          ✚ Registrar Mascota
        </button>
        <a routerLink="/mascotas" class="btn-cancelar">✕ Cancelar</a>
      </div>
    </form>
  </div>
</main>
