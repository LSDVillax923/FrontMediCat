<header class="header">
  <div class="header-container">
    <a routerLink="/inicio" class="logo">
      <img src="/img/Medicat.png" alt="Medicat logo" />
    </a>
    <nav class="nav">
      <a routerLink="/inicio" class="nav-link">Inicio</a>
      <a routerLink="/mascotas" class="nav-link">Listado de Mascotas</a>
      <a routerLink="/clientes" class="nav-link">Listado de Clientes</a>
    </nav>
  </div>
</header>

<main class="dashboard">
  <section class="dashboard-header">
    <h1 class="dashboard-title">Editar Mascota</h1>
    <p class="dashboard-subtitle">Modifica la información de {{ mascota.nombre }}</p>
  </section>

  <p *ngIf="mensaje" class="flash-message flash-message-success">{{ mensaje }}</p>
  <p *ngIf="error" class="flash-message flash-message-error">{{ error }}</p>

  <div class="form-card">
    <form (ngSubmit)="guardarCambios()">
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" name="nombre" type="text" [(ngModel)]="mascota.nombre" required />
        </div>

        <div class="form-group">
          <label for="especie">Especie</label>
          <input id="especie" name="especie" type="text" [(ngModel)]="mascota.especie" required />
        </div>

        <div class="form-group">
          <label for="raza">Raza</label>
          <input id="raza" name="raza" type="text" [(ngModel)]="mascota.raza" required />
        </div>

        <div class="form-group">
          <label for="edad">Edad (años)</label>
          <input id="edad" name="edad" type="number" min="0" [(ngModel)]="mascota.edad" required />
        </div>

        <div class="form-group">
          <label for="peso">Peso (kg)</label>
          <input id="peso" name="peso" type="number" min="0" step="0.1" [(ngModel)]="mascota.peso" required />
        </div>

        <div class="form-group">
          <label for="estado">Estado</label>
          <select id="estado" name="estado" [(ngModel)]="mascota.estado">
             <option value="activa">Activa</option>
            <option value="tratamiento">En tratamiento</option>
            <option value="inactiva">Inactiva</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="enfermedad">Enfermedad</label>
          <input id="enfermedad" name="enfermedad" type="text" [(ngModel)]="mascota.enfermedad" />
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" name="observaciones" [(ngModel)]="mascota.observaciones"></textarea>
        </div>

        <div class="form-group">
          <label for="tratamiento">Tratamiento asignado</label>
          <select id="tratamiento" name="tratamiento" [(ngModel)]="mascota.tratamiento">
            <option value="">Sin tratamiento asignado</option>
            <option *ngFor="let tratamiento of tratamientosDisponibles" [value]="tratamiento">
              {{ tratamiento }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="veterinarioAsignado">Veterinario asignado</label>
          <select id="veterinarioAsignado" name="veterinarioAsignado" [(ngModel)]="mascota.veterinarioAsignado">
            <option value="">Sin veterinario asignado</option>
            <option *ngFor="let veterinario of veterinariosDisponibles" [value]="veterinario.nombre">
              {{ veterinario.nombre }} - {{ veterinario.especialidad }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-acciones">
        <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
        <button type="button" class="btn-cancelar" (click)="cancelar()">✕ Cancelar</button>
      </div>
    </form>
  </div>
</main>
